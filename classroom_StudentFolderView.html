<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folder - Student View</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="classroom-folder-body" data-page="classroom-student-folder">
  <div class="container classroom-container classroom-folder-page">
    <div class="page-title-row">
      <img src="assets/logo.png" alt="ClassSphere logo" class="page-logo-small">
      <div>
        <h1 id="folderPageTitle">Folder</h1>
        <p id="folderPageMeta" style="margin-top:6px; color:#6b7280; font-size:14px;"></p>
      </div>
    </div>

    <div class="student-controls">
      <button class="btn leave-class-btn" type="button" id="folderBackBtn">Back to classroom</button>
    </div>

    <h2>Materials</h2>
    <div id="folderMaterials" class="announcement-board"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
